# 複製此檔案為 secrets.yaml 並填入真實資料
# secrets.yaml 已被 .gitignore 排除，不會上傳 GitHub

deribit:
  client_id: "YOUR_DERIBIT_CLIENT_ID"
  client_secret: "YOUR_DERIBIT_CLIENT_SECRET"

telegram:
  bot_token: "YOUR_TELEGRAM_BOT_TOKEN"
  chat_id: "YOUR_TELEGRAM_CHAT_ID"

server:
  host: "0.0.0.0"   # 0.0.0.0 = 所有介面；127.0.0.1 = 僅本機
  port: 8080
